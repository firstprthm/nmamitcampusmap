<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive map and guide for Nitte NMAMIT campus - Nitte, Karkala">
  <meta name="author" content="Pratham Prabhakar">

  <title>NMAMIT Campus Map</title>

  <link rel="icon" type="image/png" href="/assets/images/nitte_logo.png">

  <link rel="stylesheet" href="/css/styles.css">

  <style>
    /* Hero section — full screen banner */
  .hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    padding: 20px;

    background-image: url('/assets/images/nitte_campus.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .site-header__title {
    font-size: 1.3rem;
    font-weight: bold;
  }

  .map-container {
    margin: 20px auto;
    max-width: 95%;
  }

  .content-section {
    margin: 10px auto;
    max-width: 95%;
  }

  /* Visually hidden utility — hide from screen, not from readers */
  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  </style>
</head>

<body>

  <!-- Hero section -->
  <section class="hero" aria-label="Campus hero banner">
  </section>

  <div id="header-sentinel" style="height: 1px;"></div>

  <!-- Site Header / Navbar -->
  <header class="site-header" id="site-header" role="banner">
    <a href="/index.html">
      <img src="/assets/images/nitte_logo.png" alt="Nitte University logo — go to homepage" width="100" height="55">
    </a>

    &nbsp; <!-- Small space between logo and title -->

    <span class="site-header__title">NMAMITCAMPUS MAP</span>

    <button class="nav-toggle" id="nav-toggle" onclick="openSidebar()" aria-label="Open navigation menu" aria-controls="sidebar" aria-expanded="false">
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
    </button>
  </header>

  <!-- Sidebar Navigation Drawer -->
  <nav id="sidebar" class="sidebar" aria-label="Site navigation" aria-hidden="true">
    <button class="sidebar__close-btn" onclick="closeSidebar()" aria-label="Close navigation menu">
      &times;
    </button>
  </nav>

  <main id="main-content">

    <!-- Embedded Google Map -->
    <section class="map-section" aria-labelledby="map-heading">
      <h2 id="map-heading" class="visually-hidden">Campus Map</h2>
      
      <div class="map-container">
        <iframe src="https://www.google.com/maps/d/embed?mid=1Vg3Ah2Ry1FOxmjwWr3oZIX8ipI-WNU4&ehbc=2E312F&noprof=1"
          title="Nitte campus location on Google Maps" loading="lazy" allowfullscreen
          style="width: 100%; height: 45vh; border: none; border-radius: 10px;"></iframe>
      </div>
    </section>

    <!-- Content hint -->
    <div class="content-hint" style="text-align: center; color: white; padding: 16px;">
      <p>Use the menu (top right) to explore buildings and timetables.</p>
    </div>

    <!-- Content iframe: loads pages from the sidebar nav -->
    <section class="content-section" aria-label="Page content">
      <iframe id="content-frame" class="content-frame" src="" title="Page content" aria-live="polite"></iframe>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <p id="footer-credits" class="site-footer__credits">
      <!-- Filled by buildFooterCredits() in main.js -->
    </p>
    <p>Thank you &nbsp;|&nbsp; &copy; 2026 All rights reserved.</p>
  </footer>

  <script src="/js/data.js"></script>
  <script src="/js/main.js"></script>

</body>
</html>
